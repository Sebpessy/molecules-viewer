<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Molecular Specimen Viewer — Structure Index</title>
<script src="https://3Dmol.org/build/3Dmol-min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0f1a; --bg2:#0e1626; --panel:#111c30; --line:#1e2d46;
  --amber:#e8b15e; --amber2:#f5cd86; --ink:#e7ecf5; --muted:#8294b0;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:radial-gradient(1200px 800px at 70% -10%, #14223c 0%, var(--bg) 55%);
  color:var(--ink);
  font-family:"JetBrains Mono", monospace;
  display:flex; flex-direction:column;
  min-height:100vh; overflow-x:hidden;
}
header{
  padding:18px 24px;
  border-bottom:1px solid var(--line);
}
.kicker{
  text-transform:uppercase;
  color:var(--amber);
  letter-spacing:.28em;
  font-size:11px;
  margin:0 0 6px;
}
header h1{
  font-family:"Fraunces", serif;
  font-weight:600;
  font-size:26px;
  margin:0;
  letter-spacing:.01em;
}
.wrap{
  flex:1;
  display:flex;
  flex-direction:row;
  min-height:0;
}
.stage{
  flex:1;
  position:relative;
  min-height:340px;
}
#viewer{
  position:absolute;
  inset:0;
}
.status{
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  display:none;
  flex-direction:column;
  align-items:center;
  gap:14px;
  text-align:center;
  color:var(--muted);
  font-size:13px;
  max-width:80%;
  z-index:5;
  background:rgba(10,15,26,.72);
  padding:22px 26px;
  border:1px solid var(--line);
  border-radius:12px;
}
.status.show{display:flex;}
.spinner{
  width:34px; height:34px;
  border:3px solid var(--line);
  border-top-color:var(--amber);
  border-radius:50%;
  animation:spin .9s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
@media (prefers-reduced-motion: reduce){
  .spinner{animation:none;}
}
.panel{
  width:340px;
  border-left:1px solid var(--line);
  background:linear-gradient(180deg,var(--panel),var(--bg2));
  padding:20px;
  overflow-y:auto;
}
.search{
  position:relative;
  margin-bottom:14px;
}
#q{
  width:100%;
  background:var(--bg);
  border:1px solid var(--line);
  color:var(--ink);
  font-family:inherit;
  font-size:13px;
  padding:11px 12px;
  border-radius:8px;
  outline:none;
  transition:border-color .15s, box-shadow .15s;
}
#q::placeholder{color:var(--muted);}
#q:focus{
  border-color:var(--amber);
  box-shadow:0 0 0 3px rgba(232,177,94,.18);
}
.sugg{
  position:absolute;
  top:calc(100% + 4px);
  left:0; right:0;
  background:var(--bg2);
  border:1px solid var(--line);
  border-radius:8px;
  max-height:240px;
  overflow-y:auto;
  display:none;
  z-index:20;
  box-shadow:0 12px 30px rgba(0,0,0,.45);
}
.sugg.open{display:block;}
.item{
  padding:9px 12px;
  font-size:13px;
  cursor:pointer;
  border-bottom:1px solid rgba(30,45,70,.5);
}
.item:last-child{border-bottom:none;}
.item:hover,.item.active{
  background:rgba(232,177,94,.14);
  color:var(--amber2);
}
.chips{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  margin-bottom:20px;
}
.chip{
  background:var(--bg);
  border:1px solid var(--line);
  color:var(--muted);
  font-family:inherit;
  font-size:11px;
  padding:6px 11px;
  border-radius:999px;
  cursor:pointer;
  transition:all .15s;
}
.chip:hover{
  border-color:var(--amber);
  color:var(--amber2);
}
#info{margin-bottom:22px;}
.badge{
  display:inline-block;
  font-size:10px;
  letter-spacing:.12em;
  text-transform:uppercase;
  padding:4px 9px;
  border-radius:5px;
  margin-bottom:12px;
}
.badge.local{
  background:rgba(232,177,94,.15);
  color:var(--amber2);
  border:1px solid rgba(232,177,94,.35);
}
.badge.live{
  background:rgba(94,200,232,.15);
  color:#5ec8e8;
  border:1px solid rgba(94,200,232,.35);
}
.mname{
  font-family:"Fraunces", serif;
  font-size:22px;
  font-weight:500;
  margin:0 0 4px;
  line-height:1.2;
}
.note{
  color:var(--muted);
  font-size:11px;
  margin:0 0 14px;
}
.row{
  display:flex;
  justify-content:space-between;
  gap:12px;
  padding:7px 0;
  border-bottom:1px solid rgba(30,45,70,.5);
  font-size:12px;
}
.row .k{color:var(--muted);}
.row .v{color:var(--amber2); text-align:right; word-break:break-word;}
.controls{
  display:flex;
  flex-direction:column;
  gap:9px;
}
.ctl{
  text-align:left;
  background:var(--bg);
  border:1px solid var(--line);
  color:var(--ink);
  font-family:inherit;
  font-size:12px;
  padding:10px 13px;
  border-radius:8px;
  cursor:pointer;
  transition:border-color .15s, color .15s;
}
.ctl:hover{
  border-color:var(--amber);
  color:var(--amber2);
}
.pl{
  margin-top:24px;
  padding-top:18px;
  border-top:1px solid var(--line);
}
.pl-title{
  font-family:"Fraunces", serif;
  font-size:15px;
  font-weight:500;
  margin:0 0 4px;
  color:var(--amber2);
}
.pl-sub{
  color:var(--muted);
  font-size:10px;
  margin:0 0 12px;
}
.pl-list{margin-bottom:10px;}
.pl-empty{
  color:var(--muted);
  font-size:11px;
  font-style:italic;
  margin:0 0 4px;
}
.pl-item{
  display:flex;
  align-items:center;
  gap:9px;
  padding:8px 10px;
  background:var(--bg);
  border:1px solid var(--line);
  border-radius:8px;
  margin-bottom:6px;
  font-size:12px;
  transition:border-color .2s;
}
.pl-item.playing{
  border-color:var(--amber);
  box-shadow:0 0 0 2px rgba(232,177,94,.18);
}
.pl-num{
  color:var(--amber2);
  font-size:11px;
  width:16px;
  flex:none;
}
.pl-name{flex:1; word-break:break-word;}
.pl-rm{
  background:none;
  border:none;
  color:var(--muted);
  cursor:pointer;
  font-family:inherit;
  font-size:13px;
  padding:0 2px;
  flex:none;
}
.pl-rm:hover{color:var(--amber);}
.pl-opt{
  display:flex;
  flex-direction:column;
  gap:9px;
  margin:12px 0;
  font-size:11px;
  color:var(--muted);
}
.pl-opt label{display:flex; align-items:center; gap:8px;}
.pl-opt input[type="number"]{
  width:62px;
  background:var(--bg);
  border:1px solid var(--line);
  color:var(--ink);
  font-family:inherit;
  font-size:12px;
  padding:6px 8px;
  border-radius:6px;
  outline:none;
}
.pl-opt input[type="number"]:focus{border-color:var(--amber);}
.pl-opt input[type="checkbox"]{accent-color:var(--amber);}
.pl-play{
  margin-top:4px;
  border-color:rgba(232,177,94,.45);
  color:var(--amber2);
}
.pl-play.on{
  background:rgba(232,177,94,.14);
  border-color:var(--amber);
}
@media (max-width:860px){
  .wrap{flex-direction:column;}
  .panel{
    width:100%;
    border-left:none;
    border-top:1px solid var(--line);
  }
}
</style>
</head>
<body>
<header>
  <p class="kicker">Molecular Specimen Viewer</p>
  <h1>Structure Index</h1>
</header>
<div class="wrap">
  <div class="stage">
    <div id="viewer"></div>
    <div class="status" id="status"></div>
  </div>
  <aside class="panel">
    <div class="search">
      <input id="q" type="text" placeholder="Search any molecule…" autocomplete="off" spellcheck="false">
      <div class="sugg" id="sugg"></div>
    </div>
    <div class="chips" id="chips"></div>
    <div id="info"></div>
    <div class="controls">
      <button class="ctl" id="spinBtn">&#9210;  Toggle rotation</button>
      <button class="ctl" id="styleBtn">&#9881;  Cycle render style</button>
      <button class="ctl" id="centerBtn">&#9678;  Recenter</button>
    </div>
    <div class="pl">
      <p class="pl-title">Meditation Playlist</p>
      <p class="pl-sub">Display a specimen, then add it — up to 5.</p>
      <div class="pl-list" id="plList"></div>
      <button class="ctl" id="plAdd">&#65291;  Add current specimen</button>
      <div class="pl-opt">
        <label>Seconds each
          <input type="number" id="plDur" min="3" max="180" value="20">
        </label>
        <label><input type="checkbox" id="plVoice" checked> Gentle voice (announce name)</label>
        <label><input type="checkbox" id="plMusic" checked> Ambient music</label>
        <label><input type="checkbox" id="plLoop"> Loop session</label>
      </div>
      <button class="ctl pl-play" id="plPlay">&#9654;  Play session</button>
    </div>
  </aside>
</div>

const CHIPS = ["Ipamorelin","Caffeine","Aspirin","Dopamine","Cholesterol",
               "Testosterone","THC","Glucose","Morphine","Melatonin"];
const STYLES = ["Ball & Stick","Stick","Space-filling","Wireframe"];

const prefersReduced = window.matchMedia &&
  window.matchMedia("(prefers-reduced-motion: reduce)").matches;

let viewer = null;
let styleIdx = 0;
let spinOn = !prefersReduced;
let reqToken = 0;

const qEl = document.getElementById("q");
const suggEl = document.getElementById("sugg");
const chipsEl = document.getElementById("chips");
const infoEl = document.getElementById("info");
const statusEl = document.getElementById("status");

function esc(s){
  const d = document.createElement("div");
  d.textContent = (s == null) ? "" : String(s);
  return d.innerHTML;
}

function showStatus(html, spinner){
  statusEl.innerHTML = (spinner ? '<div class="spinner"></div>' : '') +
    '<div>' + html + '</div>';
  statusEl.classList.add("show");
}
function hideStatus(){
  statusEl.classList.remove("show");
  statusEl.innerHTML = "";
}

function getViewer(){
  if(!viewer){
    viewer = $3Dmol.createViewer("viewer", {backgroundColor:"#0a0f1a"});
  }
  return viewer;
}

function applyStyle(){
  const v = getViewer();
  v.setStyle({}, {});
  if(styleIdx === 0){
    v.setStyle({}, {stick:{radius:0.13, colorscheme:"Jmol"},
                    sphere:{scale:0.27, colorscheme:"Jmol"}});
  } else if(styleIdx === 1){
    v.setStyle({}, {stick:{radius:0.16, colorscheme:"Jmol"}});
  } else if(styleIdx === 2){
    v.setStyle({}, {sphere:{colorscheme:"Jmol"}});
  } else {
    v.setStyle({}, {line:{colorscheme:"Jmol"}});
  }
  v.render();
}

function showSpecimen(spec){
  hideStatus();
  currentSpecimenName = spec.name;
  const v = getViewer();
  v.removeAllModels();
  v.setBackgroundColor("#0a0f1a");
  v.addModel(spec.sdf, "sdf");
  styleIdx = 0;
  applyStyle();
  v.zoomTo();
  v.render();
  if(spinOn) v.spin("y", 0.6); else v.spin(false);

  const badge = spec.live
    ? '<span class="badge live">Live · PubChem</span>'
    : '<span class="badge local">Local specimen</span>';
  let rows = "";
  rows += '<div class="row"><span class="k">Formula</span><span class="v">' +
    (spec.formula ? esc(spec.formula) : "&mdash;") + '</span></div>';
  rows += '<div class="row"><span class="k">Mol. weight</span><span class="v">' +
    (spec.mw != null && spec.mw !== "" ? esc(spec.mw) + " g/mol" : "&mdash;") + '</span></div>';
  rows += '<div class="row"><span class="k">Atoms</span><span class="v">' +
    (spec.atoms != null && spec.atoms !== "" ? esc(spec.atoms) : "&mdash;") + '</span></div>';
  if(spec.cid){
    rows += '<div class="row"><span class="k">PubChem CID</span><span class="v">' +
      esc(spec.cid) + '</span></div>';
  }
  infoEl.innerHTML = badge +
    '<h2 class="mname">' + esc(spec.name) + '</h2>' +
    (spec.note ? '<p class="note">' + esc(spec.note) + '</p>' : '<p class="note">&mdash;</p>') +
    rows;
}

function loadByName(name){
  if(!name) return;
  const key = Object.keys(LIB).find(
    k => k.toLowerCase() === name.toLowerCase());
  if(key){
    const e = LIB[key];
    showSpecimen({name:key, sdf:e.sdf, formula:e.formula, mw:e.mw,
                  atoms:e.atoms, note:e.note, live:false});
  } else {
    liveLookup(name);
  }
}

async function liveLookup(query){
  query = (query || "").trim();
  if(!query) return;
  const myToken = ++reqToken;
  showStatus('Searching PubChem for "' + esc(query) + '"…', true);
  const base = "https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound";
  try{
    const cidRes = await fetch(base + "/name/" + encodeURIComponent(query) + "/cids/JSON");
    if(myToken !== reqToken) return;
    if(!cidRes.ok) throw new Error("no cid");
    const cidJson = await cidRes.json();
    const cid = cidJson.IdentifierList && cidJson.IdentifierList.CID &&
                cidJson.IdentifierList.CID[0];
    if(!cid) throw new Error("no cid");

    let sdf = null;
    let r3 = await fetch(base + "/cid/" + cid + "/SDF?record_type=3d");
    if(myToken !== reqToken) return;
    if(r3.ok){ sdf = await r3.text(); }
    else {
      let r2 = await fetch(base + "/cid/" + cid + "/SDF?record_type=2d");
      if(myToken !== reqToken) return;
      if(r2.ok){ sdf = await r2.text(); }
    }
    if(!sdf) throw new Error("no sdf");

    let formula = "", mw = "", iupac = "";
    try{
      const pr = await fetch(base + "/cid/" + cid +
        "/property/MolecularFormula,MolecularWeight,IUPACName/JSON");
      if(myToken !== reqToken) return;
      if(pr.ok){
        const pj = await pr.json();
        const p = pj.PropertyTable && pj.PropertyTable.Properties &&
                  pj.PropertyTable.Properties[0];
        if(p){
          formula = p.MolecularFormula || "";
          mw = p.MolecularWeight || "";
          iupac = p.IUPACName || "";
        }
      }
    }catch(e){ /* best-effort */ }

    let atoms = "";
    const lines = sdf.split("\n");
    if(lines.length >= 4){
      const m = lines[3].match(/\d+/);
      if(m) atoms = parseInt(m[0], 10);
    }

    if(myToken !== reqToken) return;
    const disp = query.charAt(0).toUpperCase() + query.slice(1);
    showSpecimen({
      name: disp, sdf, formula, mw, atoms, cid, live:true,
      note: iupac ? ("IUPAC · " + iupac) : ""
    });
  }catch(err){
    if(myToken !== reqToken) return;
    showStatus('Couldn’t find "' + esc(query) + '" in PubChem, and it’s ' +
      'not in the local library.<br>Try a different name or check the spelling.', false);
  }
}

// ---- suggestions ----
let activeIdx = -1;
function renderSugg(list){
  if(!list.length){ suggEl.classList.remove("open"); suggEl.innerHTML=""; return; }
  suggEl.innerHTML = list.map((n,i) =>
    '<div class="item' + (i===activeIdx?' active':'') + '" data-name="' +
    esc(n) + '">' + esc(n) + '</div>').join("");
  suggEl.classList.add("open");
  Array.from(suggEl.children).forEach(el => {
    el.addEventListener("mousedown", ev => {
      ev.preventDefault();
      const nm = el.getAttribute("data-name");
      qEl.value = nm;
      closeSugg();
      loadByName(nm);
    });
  });
}
function closeSugg(){ suggEl.classList.remove("open"); suggEl.innerHTML=""; activeIdx=-1; }
function currentList(){
  return Array.from(suggEl.querySelectorAll(".item")).map(el => el.getAttribute("data-name"));
}

qEl.addEventListener("input", () => {
  const v = qEl.value.trim().toLowerCase();
  activeIdx = -1;
  if(!v){ closeSugg(); return; }
  const matches = Object.keys(LIB)
    .filter(k => k.toLowerCase().includes(v)).slice(0, 8);
  renderSugg(matches);
});

qEl.addEventListener("keydown", (e) => {
  const list = currentList();
  if(e.key === "ArrowDown"){
    if(!list.length) return;
    e.preventDefault();
    activeIdx = (activeIdx + 1) % list.length;
    renderSugg(list);
  } else if(e.key === "ArrowUp"){
    if(!list.length) return;
    e.preventDefault();
    activeIdx = (activeIdx - 1 + list.length) % list.length;
    renderSugg(list);
  } else if(e.key === "Enter"){
    e.preventDefault();
    const pick = (activeIdx >= 0 && list[activeIdx]) ? list[activeIdx] : qEl.value.trim();
    if(activeIdx >= 0) qEl.value = pick;
    closeSugg();
    loadByName(pick);
  } else if(e.key === "Escape"){
    closeSugg();
  }
});

document.addEventListener("click", (e) => {
  if(!e.target.closest(".search")) closeSugg();
});

chipsEl.innerHTML = CHIPS.map(c =>

// ---- gentle voice ----
let chosenVoice = null;
function loadVoices(){
  if(!("speechSynthesis" in window)) return;
  const vs = speechSynthesis.getVoices();
  if(!vs.length) return;
  const prefer = ["Ava (Premium)","Allison (Premium)","Serena (Premium)","Zoe (Premium)",
                  "Ava","Allison","Serena","Samantha","Karen","Moira","Tessa","Fiona",
                  "Google UK English Female","Microsoft Zira - English (United States)",
                  "Microsoft Zira","Victoria","Google US English"];
  for(const p of prefer){
    const v = vs.find(v => v.name === p);
    if(v){ chosenVoice = v; return; }
  }
  chosenVoice = vs.find(v => /en/i.test(v.lang) &&
      /female|samantha|zira|victoria|karen|fiona|tessa|moira|serena|ava/i.test(v.name))
    || vs.find(v => /^en/i.test(v.lang)) || vs[0];
}
if("speechSynthesis" in window){
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}
function slugify(n){
  return n.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
}
// neural-TTS audio exists only for local library specimens
function audioFileFor(name){
  const key = Object.keys(LIB).find(k => k.toLowerCase() === name.toLowerCase());
  return key ? ("audio/" + slugify(key) + ".mp3") : null;
}
let announceAudio = null;
function stopAnnounce(){
  if(announceAudio){ try{ announceAudio.pause(); }catch(e){} announceAudio = null; }
}
function webSpeak(text){
  if(!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  if(chosenVoice) u.voice = chosenVoice;
  u.rate = 0.6; u.pitch = 1.2; u.volume = 0.85;
  u.onstart = () => duckMusic(true);
  u.onend = () => duckMusic(false);
  speechSynthesis.speak(u);
}
function speak(name){
  if("speechSynthesis" in window) speechSynthesis.cancel();
  stopAnnounce();
  const file = audioFileFor(name);
  if(file){
    announceAudio = new Audio(file);
    announceAudio.volume = 0.95;
    const done = () => { duckMusic(false); };
    announceAudio.onplay = () => duckMusic(true);
    announceAudio.onended = done;
    announceAudio.onerror = () => { duckMusic(false); webSpeak(name); };
    announceAudio.play().catch(() => webSpeak(name));
    return;
  }
  webSpeak(name);  // live PubChem specimens
}

// ---- ambient music (Web Audio, synthesized) ----
let actx = null, musicNodes = null, musicMaster = null;
const MUSIC_VOL = 0.13, MUSIC_DUCK = 0.045;
function duckMusic(on){
  if(!musicMaster || !actx) return;
  try{ musicMaster.gain.setTargetAtTime(on ? MUSIC_DUCK : MUSIC_VOL, actx.currentTime, 0.35); }catch(e){}
}
function startMusic(){
  if(musicNodes) return;
  if(!actx){
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return;
    actx = new AC();
  }
  if(actx.state === "suspended") actx.resume();
  const master = actx.createGain();
  master.gain.value = 0;
  master.gain.setTargetAtTime(MUSIC_VOL, actx.currentTime, 2.5);
  musicMaster = master;
  const lp = actx.createBiquadFilter();
  lp.type = "lowpass";
  lp.frequency.value = 650;
  master.connect(lp);
  lp.connect(actx.destination);
  // a calm, open chord (C2-ish drone + fifth + octave + tenth)
  const freqs = [65.41, 98.00, 130.81, 164.81, 196.00];
  const nodes = [master];
  freqs.forEach((f,i) => {
    const o = actx.createOscillator();
    o.type = "sine";
    o.frequency.value = f;
    o.detune.value = (i - 2) * 3;
    const g = actx.createGain();
    g.gain.value = 0.22;
    // slow breathing tremolo, each voice slightly different
    const lfo = actx.createOscillator();
    lfo.type = "sine";
    lfo.frequency.value = 0.05 + i * 0.018;
    const lfoG = actx.createGain();
    lfoG.gain.value = 0.1;
    lfo.connect(lfoG);
    lfoG.connect(g.gain);
    o.connect(g);
    g.connect(master);
    o.start();
    lfo.start();
    nodes.push(o, lfo);
  });
  musicNodes = nodes;
}
function stopMusic(){
  if(!musicNodes) return;
  const master = musicNodes[0];
  try{ master.gain.setTargetAtTime(0, actx.currentTime, 0.8); }catch(e){}
  const toStop = musicNodes.slice(1);
  setTimeout(() => { toStop.forEach(n => { try{ n.stop(); }catch(e){} }); }, 1600);
  musicNodes = null;
  musicMaster = null;
}

// ---- session runner ----
const plState = { playing:false, token:0 };
function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

function stopSession(){
  plState.playing = false;
  plState.token++;
  plPlayBtn.classList.remove("on");
  plPlayBtn.innerHTML = "&#9654;  Play session";
  if("speechSynthesis" in window) speechSynthesis.cancel();
  stopAnnounce();
  stopMusic();
  renderPl();
}

async function runSession(){
  const myToken = plState.token;
  do {
    for(let i=0; i<playlist.length; i++){
      if(myToken !== plState.token) return;
      const name = playlist[i];
      renderPl(i);
      loadByName(name);
      if(plVoiceEl.checked){
        await sleep(700);
        if(myToken !== plState.token) return;
        speak(name);
      }
      const secs = Math.max(3, parseInt(plDurEl.value,10) || 20);
      await sleep(secs * 1000);
      if(myToken !== plState.token) return;
    }
  } while(plLoopEl.checked && myToken === plState.token);
  if(myToken === plState.token) stopSession();
}

plPlayBtn.addEventListener("click", () => {
  if(plState.playing){ stopSession(); return; }
  if(!playlist.length) return;
  plState.playing = true;
  plState.token++;
  plPlayBtn.classList.add("on");
  plPlayBtn.innerHTML = "&#9632;  Stop session";
  if(plMusicEl.checked) startMusic();
  runSession();
});

renderPl();

window.addEventListener("load", () => {
  loadByName("Ipamorelin");
});
</script>
</body>
